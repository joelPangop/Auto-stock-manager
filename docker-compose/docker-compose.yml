services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: autos_stock_db
      MYSQL_ROOT_PASSWORD: Abc123...
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pAbc123..."]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql 
    networks:
      - backend


  autostockmanager:
    build:
      context: ../autos-stock-manager-services
      dockerfile: Dockerfile
    container_name: autostockmanager
    image: autostockmanager
    ports:
      - "8080:8080"
      - "5005:5005"
    healthcheck:
      test: ["CMD-SHELL", "curl -s --max-time 5 http://localhost:8080/api/voitures/count -o /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      #JAVA_TOOL_OPTIONS: ""
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/autos_stock_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      #SPRING_DATASOURCE_URL: jdbc:mysql://schoolspace-db.c6f8qe264enx.us-east-1.rds.amazonaws.com:3306/schoolspacedb?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Abc123...
            # --- SQL affiché ---
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"

      # --- Logs Hibernate SQL + paramètres (Hibernate 6) ---
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: "DEBUG"
      LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND: "TRACE"

      # (optionnel) transactions
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_TRANSACTION: "TRACE"
      #DB_HOST: schoolspace-db.c6f8qe264enx.us-east-1.rds.amazonaws.com
      DB_USER: root
      DB_PASSWORD: Abc123...
      SPRING_PROFILES_ACTIVE: docker
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    env_file:
      - ../autos-stock-manager-services/.env
    labels:
      ARTIFACT_CATEGORY: Computation
      Replicas: 1
    networks:
      - backend

  autostockclient:
    build:
      context: ../autos-stock-client
      dockerfile: Dockerfile
      args:
    #    REACT_APP_API_URL: http://localhost:8080
        REACT_APP_API_URL: http://autostockmanager:8080
    container_name: autostockclient
    ports:
      - "3000:80"
    depends_on:
      autostockmanager:
        condition: service_healthy
    #environment:
    # - REACT_APP_API_URL=http://autostockmanager:8080
    #  args:
    #  - VITE_API_URL=http://$(curl http://169.254.169.254/latest/meta-data/public-ipv4):8080
    environment:
      - NODE_OPTIONS=--openssl-legacy-provider

    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysql_data: