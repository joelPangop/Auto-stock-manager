services:

  localstack:
    image: localstack/localstack:3.4
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,ses,sqs,secretsmanager
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - EAGER_SERVICE_LOADING=1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - "../localstack/init.sh:/etc/localstack/init/ready.d/init.sh"
      - localstack_data:/var/lib/localstack
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: autos_stock_db
      MYSQL_ROOT_PASSWORD: Abc123...
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pAbc123..."]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql 
    networks:
      - backend


  autostockmanager:
    build:
      context: ../autos-stock-manager-services
      dockerfile: Dockerfile
    container_name: autostockmanager
    image: autostockmanager
    ports:
      - "8080:8080"
      - "5005:5005"
    healthcheck:
      test: ["CMD-SHELL", "curl -s --max-time 5 http://localhost:8080/api/voitures/count -o /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      #JAVA_TOOL_OPTIONS: ""
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/autos_stock_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      #SPRING_DATASOURCE_URL: jdbc:mysql://schoolspace-db.c6f8qe264enx.us-east-1.rds.amazonaws.com:3306/schoolspacedb?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Abc123...
            # --- SQL affiché ---
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"

      # --- Logs Hibernate SQL + paramètres (Hibernate 6) ---
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: "DEBUG"
      LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND: "TRACE"

      # (optionnel) transactions
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_TRANSACTION: "TRACE"
      #DB_HOST: schoolspace-db.c6f8qe264enx.us-east-1.rds.amazonaws.com
      DB_USER: root
      DB_PASSWORD: Abc123...
      SPRING_PROFILES_ACTIVE: docker
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://localhost:3000,http://localhost:3001"

      # AWS / LocalStack
      AWS_ENDPOINT_OVERRIDE: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      # AUTOSTOCK_S3_BUCKET: autostock-docs   # désactivé → stockage disque local persistant
      AUTOSTOCK_SES_FROM: joelpangop@gmail.com
      AUTOSTOCK_SQS_NOTIFICATIONS_URL: http://localstack:4566/000000000000/autostock-notifications
    # Les variables MAIL_*, TWILIO_*, SECURITY_JWT_* sont chargees depuis .env
    env_file:
      - ../autos-stock-manager-services/.env
    volumes:
      - uploads_data:/app/uploads
    labels:
      ARTIFACT_CATEGORY: Computation
      Replicas: 1
    networks:
      - backend

  autostockclient:
    build:
      context: ../autos-stock-client
      dockerfile: Dockerfile
      args:
    #    REACT_APP_API_URL: http://localhost:8080
        REACT_APP_API_URL: http://autostockmanager:8080
    container_name: autostockclient
    ports:
      - "3000:80"
    depends_on:
      autostockmanager:
        condition: service_healthy
    #environment:
    # - REACT_APP_API_URL=http://autostockmanager:8080
    #  args:
    #  - VITE_API_URL=http://$(curl http://169.254.169.254/latest/meta-data/public-ipv4):8080
    environment:
      - NODE_OPTIONS=--openssl-legacy-provider

    networks:
      - backend

  # ── Portail client Ted Auto (React) ──────────────────────────
  autostockcustomer:
    build:
      context: ../autostock-customer
      dockerfile: Dockerfile
    container_name: autostockcustomer
    image: autostockcustomer
    ports:
      - "3001:80"
    depends_on:
      autostockmanager:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
  localstack_data:
  uploads_data: