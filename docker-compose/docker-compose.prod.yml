# Override production — Hetzner VPS + AWS réel
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:

  # Désactiver LocalStack en prod
  localstack:
    profiles:
      - dev-only

  autostockmanager:
    environment:
      AWS_ENDPOINT_OVERRIDE: ""
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AUTOSTOCK_S3_BUCKET: ${AUTOSTOCK_S3_BUCKET}
      AUTOSTOCK_SES_FROM: ${AUTOSTOCK_SES_FROM}
      AUTOSTOCK_SQS_NOTIFICATIONS_URL: ${AUTOSTOCK_SQS_NOTIFICATIONS_URL}
      APP_CORS_ALLOWED_ORIGINS: "http://178.156.213.72:3000,http://178.156.213.72:3001"
    depends_on:
      mysql:
        condition: service_healthy
      localstack:
        condition: service_healthy
        required: false
