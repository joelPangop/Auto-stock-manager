spring.application.name=autos-stock-manager

# =============================================================================
# BASE DE DONNEES
# =============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/autos_stock_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Abc123...}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================================================
# JWT
# =============================================================================
# Cle secrete HS256 en Base64 (>= 44 chars). Surcharger via SECURITY_JWT_SECRET.
security.jwt.secret=${SECURITY_JWT_SECRET:VGhpcy1pcy1hLXN0cm9uZy1iYXNlNjQtc2VjcmV0LWtleS1jaGFuZ2UtbWUtIQpCMV9OU0RKS1BfQzRzM2JxQ1Q=}
# Access token : 15 minutes en ms
security.jwt.access-expiration=${SECURITY_JWT_ACCESS_EXPIRATION:900000}
# Refresh token : 14 jours en ms
security.jwt.refresh-expiration=${SECURITY_JWT_REFRESH_EXPIRATION:1209600000}

# =============================================================================
# CORS
# =============================================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# =============================================================================
# UPLOAD DE FICHIERS
# =============================================================================
autostock.docs.dir=uploads
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# =============================================================================
# EMAIL (SMTP)
# =============================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================================================
# SMS via Twilio (optionnel)
# =============================================================================
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# =============================================================================
# AWS / LocalStack
# =============================================================================
aws.endpoint-override=${AWS_ENDPOINT_OVERRIDE:}
aws.region=${AWS_REGION:us-east-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID:test}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:test}

# S3 — bucket pour documents et photos de voitures
aws.s3.bucket=${AUTOSTOCK_S3_BUCKET:}

# SES — adresse expéditrice vérifiée
aws.ses.from=${AUTOSTOCK_SES_FROM:}

# SQS — URL de la queue de notifications
aws.sqs.notifications-url=${AUTOSTOCK_SQS_NOTIFICATIONS_URL:}

# =============================================================================
# LOGS
# =============================================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.transaction=TRACE
logging.file.name=logs/autos-stock-manager.log
