name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: 

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: Abc123...
          MYSQL_DATABASE: autos_stock_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
 

      - name: Build JAR
        working-directory: Autos-stock-manager-services
        run: mvn clean package -DskipTests

      - name: Build and run tests
        working-directory: Autos-stock-manager-services
        run: mvn test -Dspring.profiles.active=test -Dspring.datasource.driver-class-name=org.h2.Driver

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Make mvnw executable
        run: chmod +x ./Autos-stock-manager-services/mvnw

      - name: Build JAR file
        working-directory: ./Autos-stock-manager-services
        run: ./mvnw clean package -DskipTests

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Autos-stock-manager-services
          file: ./Autos-stock-manager-services/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/autostockmanager:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./autos-stock-client
          file: ./autos-stock-client/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/autostockclient:latest
          
  deploy-to-vps:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: 🔑 Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_autostock
          chmod 600 ~/.ssh/id_autostock
          ssh-keyscan -H 178.156.213.72 >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_autostock root@178.156.213.72 << 'ENDSSH'
            set -e
            cd /root/Auto-stock-manager
            git pull origin master
            cd docker-compose
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
          ENDSSH
