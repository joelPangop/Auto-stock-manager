<div class="page">

  <div class="top-bar">
    <mat-slide-toggle [(ngModel)]="onlyAdmins" (change)="load()">
      Admins seulement
    </mat-slide-toggle>

    <button mat-flat-button color="primary" (click)="create()">
      <mat-icon>add</mat-icon>&nbsp;Nouvel utilisateur
    </button>
  </div>

  <mat-card class="card">
    <mat-card-title>Utilisateurs</mat-card-title>
    <mat-card-content>

      <div class="table-wrap" [class.loading]="loading">
        <table mat-table [dataSource]="data">

          <!-- Nom -->
          <ng-container matColumnDef="nom">
            <th mat-header-cell *matHeaderCellDef>Nom</th>
            <td mat-cell *matCellDef="let u">{{ u.nom }}</td>
          </ng-container>

          <!-- Email -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let u">{{ u.email }}</td>
          </ng-container>

          <!-- Role -->
          <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef>Rôle</th>
            <td mat-cell *matCellDef="let u">
              <span class="role-badge"
                    [class.super-admin]="u.role === 'SUPER_ADMIN'"
                    [class.admin]="u.role === 'ADMIN'">
                {{ u.role }}
              </span>
            </td>
          </ng-container>

          <!-- Status -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Statut</th>
            <td mat-cell *matCellDef="let u">
              <span *ngIf="u.accountLocked" class="locked-badge">
                <mat-icon style="font-size:16px;height:16px;width:16px;vertical-align:middle">lock</mat-icon>
                Verrouillé
              </span>
              <span *ngIf="!u.accountLocked && u.passwordExpiresAt" class="expiry-badge">
                <mat-icon style="font-size:16px;height:16px;width:16px;vertical-align:middle">schedule</mat-icon>
                Temporaire
              </span>
              <span *ngIf="!u.accountLocked && !u.passwordExpiresAt" class="active-badge">
                Actif
              </span>
            </td>
          </ng-container>

          <!-- Actions -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
            <td mat-cell *matCellDef="let u" class="actions-col">
              <button mat-icon-button (click)="edit(u.id)" matTooltip="Modifier">
                <mat-icon>edit</mat-icon>
              </button>

              <button mat-icon-button color="accent"
                      *ngIf="isSuperAdmin"
                      (click)="regeneratePassword(u.id)"
                      matTooltip="Régénérer mot de passe">
                <mat-icon>refresh</mat-icon>
              </button>

              <button mat-icon-button color="warn" (click)="delete(u.id)" matTooltip="Supprimer">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>

    </mat-card-content>

    <mat-paginator
                   [length]="total"
                   [pageSize]="pageSize"
                   [pageIndex]="pageIndex"
                   [pageSizeOptions]="[5,10,20]">
    </mat-paginator>
  </mat-card>
</div>
