<div class="auth-wrapper">
  <mat-card class="auth-card" appearance="outlined">
    <h1>Mot de passe oublié</h1>
    <p class="subtitle">Entrez votre email ou numéro de téléphone.</p>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">

      <mat-form-field appearance="outline" class="field">
        <mat-label>Email ou numéro de téléphone</mat-label>
        <mat-icon matPrefix>{{ isPhone ? 'phone' : 'email' }}</mat-icon>
        <input matInput formControlName="identifier"
               placeholder="votre@email.com ou +237 6XX XXX XXX"
               (input)="onIdentifierChange()" />
        <mat-hint>Entrez l'email ou le numéro utilisé lors de votre inscription</mat-hint>
        <mat-error *ngIf="form.controls.identifier.hasError('required')">Requis</mat-error>
        <mat-error *ngIf="form.controls.identifier.hasError('minlength')">Trop court</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>Recevoir le code par</mat-label>
        <mat-select formControlName="deliveryMethod">
          <mat-option value="EMAIL">
            <span class="option-label"><mat-icon>email</mat-icon> Email</span>
          </mat-option>
          <mat-option value="SMS">
            <span class="option-label"><mat-icon>sms</mat-icon> SMS</span>
          </mat-option>
        </mat-select>
      </mat-form-field>

      <button mat-raised-button color="primary" class="btn"
              [disabled]="loading || form.invalid" type="submit">
        <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        <span *ngIf="!loading">Envoyer le code</span>
      </button>

      <div class="meta">
        <a routerLink="/login">
          <mat-icon>arrow_back</mat-icon> Retour à la connexion
        </a>
      </div>
    </form>
  </mat-card>
</div>
